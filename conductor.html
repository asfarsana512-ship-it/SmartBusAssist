<!DOCTYPE html>
<html>
<head>
    <title>Conductor - Ticketing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>👨‍✈️ Conductor Ticketing</h1>
    <div class="panel">
        <label>Passenger Destination:</label><br>
        <select id="passengerDest">
            <option value="Pala">Pala</option>
            <option value="Kottayam">Kottayam</option>
            <option value="Ettumanoor">Ettumanoor</option>
            <option value="Kuravilangad">Kuravilangad</option>
            <option value="Changanassery">Changanassery</option>
        </select><br><br>

        <button onclick="bookPassenger()">Issue Ticket (+1)</button>
        
        <hr style="margin: 20px 0;">
        
        <label>Current Bus Location (Update Stop):</label><br>
        <select id="currentBusStop">
            <option value="Pala">Pala</option>
            <option value="Kottayam">Kottayam</option>
            <option value="Ettumanoor">Ettumanoor</option>
            <option value="Kuravilangad">Kuravilangad</option>
            <option value="Changanassery">Changanassery</option>
        </select><br><br>
        <button onclick="updateLocation()" style="background-color: #28a745;">Arrived at Stop</button>
        
        <button onclick="resetTrip()" style="background-color: #dc3545; margin-top: 10px;">Reset Trip</button>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
